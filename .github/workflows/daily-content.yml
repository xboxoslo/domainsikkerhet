name: Daily DMARC scan + content update

on:
  schedule:
    # Hver dag kl 06:00 UTC = 07:00/08:00 norsk tid (sommer/vinter)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Tillat manuell trigging fra GitHub UI

permissions:
  contents: write  # Må kunne committe og pushe

env:
  # Bruk Node.js 24 for actions som checkout/setup-python (Node 20 deprecated juni 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scan-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.BOT_PAT }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Bruker kun standard library — ingen pip-installs nødvendig

      - name: Run daily DNS scan
        run: python scripts/daily_scan.py

      - name: Generate trends page
        run: python scripts/generate_trends.py

      - name: Generate per-domain check pages (programmatic SEO)
        run: python scripts/generate_domain_pages.py

      - name: Update sitemap
        run: python scripts/update_sitemap.py

      - name: Commit and push if changed
        run: |
          git config user.name "data1.no bot"
          git config user.email "bot@data1.no"

          # Bare commit hvis det faktisk er endringer
          if [[ -n $(git status --porcelain) ]]; then
            git add _data/snapshots/ trender/ sjekk/ sitemap.xml
            git commit -m "Daily scan: $(date -u +%Y-%m-%d) [skip ci]"
            git push
            echo "Endringer pushet."
          else
            echo "Ingen endringer i dag."
          fi

      - name: Ping Google for re-indeksering
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://data1.no/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://data1.no/sitemap.xml" || true
          echo "Search engines pinget."
